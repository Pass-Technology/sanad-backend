name: Build & Deploy

on:
  push:
    branches: [main, staging]

env:
  REGISTRY: docker.io
  IMAGE_NAME: hossamhass/sanad-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "staging" ]; then
            echo "tag=staging" >> $GITHUB_OUTPUT
            echo "app_id=2frEXm-aQniOg3viilfda" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "app_id=YJvIDl_JIJ8n0Lnft_TsE" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}-${{ github.sha }}

      - name: Trigger Dokploy deploy
        run: |
          resp=$(curl -sS -w "\n%{http_code}" -X POST "https://deploy.trysanad.us/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ steps.tag.outputs.app_id }}\"}")
          code=$(echo "$resp" | tail -n1); body=$(echo "$resp" | sed "\$d")
          echo "Dokploy ($code): $body"
          [ "$code" = "200" ] || exit 1
