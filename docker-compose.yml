services:
  postgres:
    image: postgres:16-alpine
    container_name: sanad-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sanad_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: development # <--- Tells Docker to stop at the development stage
    container_name: sanad-app
    ports:
      - "3000:3000"
      - "9229:9229" # Expose debugging port if you want to attach a debugger
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sanad_test
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-test-secret-key}
      PORT: 3000
    volumes:
      - .:/app            # Mounts your local files into the container for hot-reloading
      - /app/node_modules # Anonymous volume to prevent your host's node_modules from overwriting the container's Linux-native ones
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
